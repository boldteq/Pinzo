<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <rect width="120" height="120" rx="22" fill="#008060"/>
  <g transform="translate(58,56)">
    <!-- White pin body forming P shape -->
    <path d="M0,36 C-5,18 -30,-2 -30,-20 A30,30 0 0,1 30,-20 C30,-2 5,18 0,36Z" fill="#fff"/>
    <!-- Green P-stem curve (left side cutout creating the P letter) -->
    <path d="M-14,-46 C-26,-34 -26,-10 -20,10 C-16,22 -10,30 -4,36" stroke="#008060" stroke-width="9" fill="none" stroke-linecap="round"/>
    <!-- Green outer ring inside pin head -->
    <circle cx="2" cy="-18" r="20" fill="#008060"/>
    <!-- White middle ring -->
    <circle cx="2" cy="-18" r="14" fill="#fff"/>
    <!-- Green inner center -->
    <circle cx="2" cy="-18" r="10" fill="#008060"/>
    <!-- White checkmark -->
    <polyline points="-3,-18 0.5,-14 8,-23" stroke="#fff" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
