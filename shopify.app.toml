# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "467630f9b523b4327258fcda08ecaac9"
name = "Pinzo"
application_url = "https://zip-code-checker-production-b1a0.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[app_proxy]
url = "https://zip-code-checker-production-b1a0.up.railway.app"
subpath = "zipcheck"
prefix = "apps"

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/webhooks/app_subscriptions/update"

  # GDPR compliance webhooks (required for Shopify App Store listing).
  # Uses compliance_topics per Shopify CLI schema (https://shopify.dev/docs/apps/build/cli-for-apps/app-configuration#compliance-topics).
  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request" ]
  uri = "/webhooks/customers/data_request"

  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/redact" ]
  uri = "/webhooks/customers/redact"

  [[webhooks.subscriptions]]
  compliance_topics = [ "shop/redact" ]
  uri = "/webhooks/shop/redact"

  # Invalidate product/collection cache when merchant updates catalog
  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "/webhooks/products/update"

  [[webhooks.subscriptions]]
  topics = [ "collections/update" ]
  uri = "/webhooks/collections/update"

[access_scopes]
# read_themes is required to detect whether the app embed is enabled in the
# merchant's active theme (reads config/settings_data.json via GraphQL themes API).
# read_app_subscriptions is required to sync billing state from Shopify.
scopes = "read_themes,read_products,read_app_subscriptions"
optional_scopes = []
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://zip-code-checker-production-b1a0.up.railway.app/auth/callback" ]
